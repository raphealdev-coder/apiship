<svg width="200" height="40" viewBox="0 0 200 40" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ApiShip">
  <defs>
    <linearGradient id="apiShipGrad" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6c5ce7"/>
      <stop offset="1" stop-color="#00d2ff"/>
    </linearGradient>
  </defs>
  <!-- Mark: rounded square with an API node graph -->
  <rect x="2" y="2" width="36" height="36" rx="10" fill="url(#apiShipGrad)"/>
  <g stroke="#ffffff" stroke-width="2.2" stroke-linecap="round">
    <line x1="13" y1="27" x2="20" y2="13"/>
    <line x1="20" y1="13" x2="27" y2="27"/>
    <line x1="15.5" y1="22" x2="24.5" y2="22"/>
  </g>
  <circle cx="13" cy="27" r="3.1" fill="#0b1020" stroke="#ffffff" stroke-width="1.6"/>
  <circle cx="20" cy="13" r="3.1" fill="#0b1020" stroke="#ffffff" stroke-width="1.6"/>
  <circle cx="27" cy="27" r="3.1" fill="#0b1020" stroke="#ffffff" stroke-width="1.6"/>
  <!-- Wordmark -->
  <text x="50" y="27" font-family="Segoe UI, system-ui, sans-serif" font-size="21" font-weight="700" fill="#ffffff">Api<tspan fill="#00d2ff">Ship</tspan></text>
</svg>
